<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    .red-circle{
    background-color:red;
    width:200px;
    height: 200px;
    border-radius:50%;
    position: relative;
    left: 250px;
    top:150px;

  }
  .blue-box{
    margin-top: 200px;
    margin-left: 200px;
    background-color: blue;
    width:500px;
    height:300px;
  }

  </style>
</head>
  
<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
